environment: "development"
random_seed: 42

preprocessing_config:
  preprocess: false
  split_ratio: 0.8

train_config:
  train: false
  batch_size: 2
  num_epochs: 100
  save_model: true
  model_name: "model.pth"

validation_config:
  model_path: "trained_models/best_model_2.pth"
  evaluate: false
  predict: true

file_paths:
  raw_data: "data/raw/training/"
  preproc_data: "data/preproc/" # /train and /test
  model_save_path: "models/"
