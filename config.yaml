environment: "development"
random_seed: 42

preprocessing_config:
  preprocess: false
  split_ratio: 0.8

train_config:
  train: true
  resume_training: true
  resume_from: "trained_models/best_model_2.pth"
  batch_size: 8
  num_epochs: 50
  learning_rate: 0.0001
  save_model: true
  model_name: "model.pth"

validation_config:
  model_path: "trained_models/best_model_2.pth"
  evaluate: false
  predict: false

file_paths:
  raw_data: "data/raw/training/"
  preproc_data: "data/preproc/" # /train and /test
  model_save_path: "models/"
